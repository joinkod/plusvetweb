<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plus Vet — Panel de contenido</title>
</head>
<body>
  <script>
    // Intercept window.open
    var _open = window.open;
    window.open = function(url, name, features) {
      if (url && typeof url === 'string' && url.includes('auth')) {
        console.log('[CMS DEBUG] window.open → URL:', url);
      }
      return _open.apply(this, arguments);
    };

    // Intercept addEventListener
    var _addEL = window.addEventListener.bind(window);
    window.addEventListener = function(type, fn, opts) {
      if (type === 'message') {
        console.log('[CMS DEBUG] message listener registered');
        var wrapped = function(e) {
          console.log('[CMS DEBUG] message listener fired — origin:', e.origin, '— data:', typeof e.data === 'string' ? e.data.slice(0, 80) : typeof e.data);
          try {
            var r = fn.apply(this, arguments);
            if (r && typeof r.then === 'function') {
              r.catch(function(err) { console.error('[CMS DEBUG] handler promise rejected:', err); });
            }
            return r;
          } catch(err) {
            console.error('[CMS DEBUG] handler threw synchronously:', err);
            throw err;
          }
        };
        return _addEL(type, wrapped, opts);
      }
      return _addEL(type, fn, opts);
    };

    // Intercept fetch to see ALL network calls
    var _fetch = window.fetch;
    window.fetch = function(input, opts) {
      var url = typeof input === 'string' ? input : (input && input.url) || String(input);
      console.log('[CMS DEBUG] fetch →', url.slice(0, 120));
      return _fetch.apply(this, arguments).then(function(res) {
        console.log('[CMS DEBUG] fetch ←', res.status, url.slice(0, 80));
        return res;
      }, function(err) {
        console.error('[CMS DEBUG] fetch ERROR', url.slice(0, 80), err);
        throw err;
      });
    };

    // Catch unhandled promise rejections
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[CMS DEBUG] Unhandled rejection:', e.reason);
    });

    // When message arrives, test the token directly against GitHub API
    window.addEventListener('message', function(e) {
      if (typeof e.data !== 'string' || !e.data.startsWith('authorization:github:success:')) return;
      try {
        var creds = JSON.parse(e.data.slice('authorization:github:success:'.length));
        console.log('[CMS DEBUG] Testing token directly with GitHub API...');
        fetch('https://api.github.com/user', {
          headers: { 'Authorization': 'token ' + creds.token, 'Accept': 'application/vnd.github+json' }
        }).then(function(r) {
          console.log('[CMS DEBUG] GitHub /user status:', r.status);
          return r.json();
        }).then(function(u) {
          console.log('[CMS DEBUG] GitHub user:', u.login || u.message);
        }).catch(function(err) {
          console.error('[CMS DEBUG] GitHub API fetch error:', err);
        });
      } catch(ex) { console.error('[CMS DEBUG] parse error:', ex); }
    });
  </script>
  <script src="https://unpkg.com/decap-cms@3.1.2/dist/decap-cms.js"></script>
</body>
</html>
