<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plus Vet — Panel de contenido</title>
</head>
<body>
  <script>
    // Decap CMS rejects postMessage when e.source is the popup window reference.
    // Re-dispatching as a synthetic event (source=null) makes it accept the token.
    (function() {
      window.addEventListener('message', function(e) {
        if (e.source === null) return;
        if (typeof e.data !== 'string' || !e.data.startsWith('authorization:github:success:')) return;
        var data = e.data;
        setTimeout(function() {
          window.dispatchEvent(new MessageEvent('message', {
            data: data,
            origin: window.location.origin,
            source: null
          }));
        }, 500);
      });
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@3.1.2/dist/decap-cms.js"></script>
</body>
</html>
